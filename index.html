<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>演绎法</title>
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/islgl/img-hosting/imgs/lgl.svg" type="image/x-icon">
    <link rel="stylesheet"
        href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        .fa {
            font-size: 30px;
            color: #000;
            /* margin-right: 20px; */
        }

        .gallery {
            --size: 100px;
            display: grid;
            grid-template-columns: repeat(6, var(--size));
            grid-auto-rows: var(--size);
            margin-bottom: var(--size);
            place-items: start center;
            gap: 5px;

            &:has(:hover) img:not(:hover),
            &:has(:focus) img:not(:focus) {
                filter: brightness(0.5) contrast(0.5);
            }

            & img {
                object-fit: cover;
                width: calc(var(--size) * 2);
                height: calc(var(--size) * 2);
                clip-path: path("M90,10 C100,0 100,0 110,10 190,90 190,90 190,90 200,100 200,100 190,110 190,110 110,190 110,190 100,200 100,200 90,190 90,190 10,110 10,110 0,100 0,100 10,90Z");
                transition: clip-path 0.25s, filter 0.75s;
                grid-column: auto / span 2;
                border-radius: 5px;

                &:nth-child(5n - 1) {
                    grid-column: 2 / span 2
                }

                &:hover,
                &:focus {
                    clip-path: path("M0,0 C0,0 200,0 200,0 200,0 200,100 200,100 200,100 200,200 200,200 200,200 100,200 100,200 100,200 100,200 0,200 0,200 0,100 0,100 0,100 0,100 0,100Z");
                    z-index: 1;
                    transition: clip-path 0.25s, filter 0.25s;
                }

                &:focus {
                    outline: 1px dashed black;
                    outline-offset: -5px;
                }
            }
        }

        .icon {
            width: 30px;
            height: 30px;
            margin: 20px;
        }
    </style>

</head>

<body>
    <!-- partial:index.partial.html -->

        <img src="https://cdn.jsdelivr.net/gh/islgl/img-hosting/imgs/202402242051603.jpeg"
